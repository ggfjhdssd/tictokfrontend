<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Agent Panel</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05050c;--sur:rgba(255,255,255,.04);--bdr:rgba(255,255,255,.072);
  --acc:#5c35f5;--pk:#f54565;--grn:#00cc88;--blu:#3d9eff;--ylw:#f5b800;
  --tx:#eaeaf2;--sub:rgba(255,255,255,.34);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Outfit',sans-serif;background:var(--bg);min-height:100vh;color:var(--tx);overflow-x:hidden;}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb1{position:absolute;width:500px;height:500px;border-radius:50%;top:-100px;left:-80px;
  background:radial-gradient(circle,rgba(92,53,245,.12) 0%,transparent 70%);}
.orb2{position:absolute;width:400px;height:400px;border-radius:50%;bottom:-80px;right:-60px;
  background:radial-gradient(circle,rgba(0,204,136,.09) 0%,transparent 70%);}
.gbg{position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:38px 38px;}

#ldr{position:fixed;inset:0;background:var(--bg);z-index:600;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.ldr-t{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,#00cc88,#3d9eff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.ring{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:#00cc88;
  border-radius:50%;animation:spin .85s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

#app{position:relative;z-index:1;max-width:440px;margin:0 auto;padding:12px 12px 60px;display:none;}

/* Header */
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:14px 16px;
  background:var(--sur);border:1px solid var(--bdr);border-radius:17px;backdrop-filter:blur(18px);}
.hdr-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#00cc88,#3d9eff);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.hdr-name{font-weight:800;font-size:1rem;line-height:1.2;}
.hdr-role{font-size:11px;color:var(--grn);font-weight:700;margin-top:2px;}
.hdr-bal{margin-left:auto;text-align:right;}
.hdr-bal-val{font-weight:900;color:var(--grn);font-size:1.1rem;}
.hdr-bal-lbl{font-size:10px;color:var(--sub);}

/* Stats row */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px;}
.stat-box{background:var(--sur);border:1px solid var(--bdr);border-radius:13px;
  padding:12px 10px;text-align:center;backdrop-filter:blur(10px);}
.stat-val{font-size:1.3rem;font-weight:900;line-height:1;}
.stat-lbl{font-size:10px;color:var(--sub);margin-top:3px;}

/* Referral card */
.ref-card{background:linear-gradient(135deg,rgba(92,53,245,.18),rgba(0,204,136,.12));
  border:1px solid rgba(92,53,245,.35);border-radius:17px;padding:14px 16px;
  margin-bottom:14px;backdrop-filter:blur(14px);}
.ref-title{font-size:12px;color:var(--sub);margin-bottom:5px;font-weight:600;}
.ref-link{font-size:12px;color:#a78bfa;word-break:break-all;font-family:monospace;
  background:rgba(0,0,0,.25);padding:8px 10px;border-radius:8px;margin-bottom:9px;line-height:1.5;}
.ref-btns{display:flex;gap:7px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;
  font-family:'Outfit',sans-serif;font-weight:700;border:none;cursor:pointer;
  transition:all .14s;border-radius:10px;padding:9px 13px;color:#fff;font-size:12px;}
.btn:active{transform:scale(.96);}
.btn-full{width:100%;}
.btn-grn{background:linear-gradient(135deg,#059669,#10b981);}
.btn-blu{background:linear-gradient(135deg,#1d4ed8,#3b82f6);}
.btn-pur{background:linear-gradient(135deg,#5c35f5,#7c3aed);}
.btn-ylw{background:linear-gradient(135deg,#b45309,#f59e0b);}
.btn-gh{background:rgba(255,255,255,.08);color:rgba(255,255,255,.65);}

/* Section title */
.sec-title{font-size:13px;font-weight:800;color:var(--tx);margin-bottom:10px;
  display:flex;align-items:center;gap:7px;}
.sec-title span{opacity:.5;font-weight:400;}

/* Box grid */
.box-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}

/* Milestone box */
.ms-box{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;
  padding:13px;backdrop-filter:blur(10px);position:relative;overflow:hidden;transition:.2s;}
.ms-box.completed{border-color:rgba(0,204,136,.4);background:rgba(0,204,136,.07);}
.ms-box.locked{opacity:.45;pointer-events:none;}
.ms-box.current{border-color:rgba(92,53,245,.5);background:rgba(92,53,245,.08);}
.ms-box.loop-box{border-color:rgba(245,184,0,.45);background:rgba(245,184,0,.07);}

.box-num{font-size:10px;font-weight:800;color:var(--sub);margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase;}
.box-bonus{font-size:1rem;font-weight:900;color:var(--ylw);line-height:1;}
.box-bonus.grn{color:var(--grn);}
.box-sub{font-size:10px;color:var(--sub);margin-top:3px;line-height:1.4;}

/* Progress bar */
.prog-wrap{margin-top:9px;}
.prog-bar{width:100%;height:6px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .6s ease;
  background:linear-gradient(90deg,#5c35f5,#00cc88);}
.prog-fill.full{background:linear-gradient(90deg,#059669,#00cc88);}
.prog-fill.ylw{background:linear-gradient(90deg,#b45309,#f5b800);}
.prog-txt{font-size:10px;color:var(--sub);margin-top:4px;display:flex;justify-content:space-between;}

/* Claim btn */
.claim-btn{margin-top:8px;width:100%;padding:7px;font-size:11px;border-radius:8px;font-weight:700;
  border:none;cursor:pointer;transition:.14s;font-family:'Outfit',sans-serif;}
.claim-btn.ready{background:linear-gradient(135deg,#059669,#10b981);color:#fff;}
.claim-btn.done{background:rgba(0,204,136,.15);color:var(--grn);cursor:default;}
.claim-btn.pending{background:rgba(255,255,255,.05);color:var(--sub);cursor:default;}

/* Box 10 loop */
.loop-badge{position:absolute;top:8px;right:8px;background:rgba(245,184,0,.2);
  color:#f5b800;font-size:9px;font-weight:800;border-radius:6px;padding:2px 5px;border:1px solid rgba(245,184,0,.3);}

/* Sub list */
.sub-card{background:rgba(255,255,255,.03);border:1px solid var(--bdr);border-radius:12px;
  padding:11px 13px;margin-bottom:6px;}
.sub-name{font-weight:700;font-size:13px;}
.sub-meta{font-size:11px;color:var(--sub);margin-top:2px;}
.sub-bal{font-weight:800;color:var(--grn);font-size:13px;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(20,20,35,.92);border:1px solid var(--bdr);border-radius:12px;
  padding:11px 20px;font-size:13px;font-weight:700;z-index:9999;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1);backdrop-filter:blur(16px);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(0,204,136,.35);color:var(--grn);}
.toast.err{border-color:rgba(245,69,101,.35);color:#f87171;}

/* Section card */
.sec-card{background:var(--sur);border:1px solid var(--bdr);border-radius:17px;
  padding:14px 15px;margin-bottom:12px;backdrop-filter:blur(14px);}

.inp{width:100%;padding:10px 12px;background:rgba(0,0,0,.22);border:1px solid var(--bdr);
  border-radius:10px;color:var(--tx);font-family:'Outfit',sans-serif;font-size:13px;
  outline:none;transition:.22s;}
.inp:focus{border-color:var(--acc);}
.inp::placeholder{color:rgba(255,255,255,.18);}

.dep-badge{display:inline-block;background:rgba(245,69,101,.2);color:#f87171;
  font-size:10px;font-weight:800;border-radius:6px;padding:2px 6px;border:1px solid rgba(245,69,101,.3);vertical-align:middle;}

.not-agent{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;text-align:center;gap:12px;}
.na-icon{font-size:4rem;}
.na-title{font-size:1.2rem;font-weight:800;}
.na-sub{font-size:13px;color:var(--sub);max-width:260px;line-height:1.6;}
</style>
</head>
<body>
<div class="bg"><div class="orb1"></div><div class="orb2"></div><div class="gbg"></div></div>

<div id="ldr">
  <div class="ldr-t">🎯 Agent Panel</div>
  <div class="ring"></div>
</div>

<div id="app"></div>

<div class="toast" id="toast"></div>

<script>
const BACKEND = 'https://tiktocbackend-zktq.onrender.com';
const API = BACKEND;

const BOX_CONFIG = [
  { box:1, people:5,  perPerson:1000,  bonus:500,      label:'Box 1' },
  { box:2, people:10, perPerson:2000,  bonus:2000,     label:'Box 2' },
  { box:3, people:30, perPerson:3000,  bonus:10000,    label:'Box 3' },
  { box:4, people:50, perPerson:5000,  bonus:30000,    label:'Box 4' },
  { box:5, people:70, perPerson:10000, bonus:80000,    label:'Box 5' },
  { box:6, people:100,perPerson:20000, bonus:300000,   label:'Box 6' },
  { box:7, people:150,perPerson:30000, bonus:800000,   label:'Box 7' },
  { box:8, people:200,perPerson:50000, bonus:2000000,  label:'Box 8' },
  { box:9, people:70, perPerson:70000, bonus:1000000,  label:'Box 9' },
  { box:10,people:10, perPerson:2000,  bonus:2000,     label:'Box 10 ♾️', loop:true }
];

let agentData = null;
let myTelegramId = null;

function toast(msg, ok=true){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (ok?'ok':'err');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

async function api(path, opts={}){
  const headers = {'Content-Type':'application/json', ...(opts.headers||{})};
  if(myTelegramId) headers['x-telegram-id'] = myTelegramId;
  const res = await fetch(BACKEND+path, {...opts, headers});
  const data = await res.json();
  if(!res.ok) throw new Error(data.error||'Error');
  return data;
}

// ── Parse user ID from Telegram initData string (manual decode) ──
function parseUserFromInitData(initDataStr) {
  if (!initDataStr) return null;
  try {
    const params = new URLSearchParams(initDataStr);
    const userStr = params.get('user');
    if (userStr) return JSON.parse(userStr);
  } catch(e) {}
  return null;
}

// ── Wait for Telegram WebApp to be fully ready, then resolve user ──
function waitForTelegramUser(tg, timeoutMs = 3000) {
  return new Promise((resolve) => {
    // If already have user data, resolve immediately
    if (tg?.initDataUnsafe?.user?.id) {
      resolve(tg.initDataUnsafe.user);
      return;
    }
    // Try parsing from initData string directly
    const parsed = parseUserFromInitData(tg?.initData);
    if (parsed?.id) {
      resolve(parsed);
      return;
    }
    // Wait a bit for Telegram to inject data (some clients are slow)
    let elapsed = 0;
    const interval = setInterval(() => {
      elapsed += 100;
      const u = tg?.initDataUnsafe?.user;
      if (u?.id) {
        clearInterval(interval);
        resolve(u);
        return;
      }
      const p = parseUserFromInitData(tg?.initData);
      if (p?.id) {
        clearInterval(interval);
        resolve(p);
        return;
      }
      if (elapsed >= timeoutMs) {
        clearInterval(interval);
        resolve(null); // timeout
      }
    }, 100);
  });
}

function fmtMMK(n){
  if(!n && n!==0) return '0 ကျပ်';
  return Number(n).toLocaleString() + ' ကျပ်';
}
// Keep fmtK alias for internal use but now returns ကျပ် format
function fmtK(n){
  if(!n && n!==0) return '0 ကျပ်';
  return Number(n).toLocaleString() + ' ကျပ်';
}

function copyText(txt){
  navigator.clipboard.writeText(txt).then(()=>toast('📋 Copy ပြီးပါပြီ')).catch(()=>toast('Copy မရပါ',false));
}

function shareLink(link){
  const text = '🎮 TicToeTic ကစားပြီး ငွေရှာကြစို့!\n\n'+link;
  if(window.Telegram?.WebApp) {
    window.Telegram.WebApp.openTelegramLink('https://t.me/share/url?url='+encodeURIComponent(link)+'&text='+encodeURIComponent('🎮 TicToeTic ကစားပြီး ငွေရှာကြစို့!'));
  } else {
    copyText(link);
  }
}

async function init(){
  const tg = window.Telegram?.WebApp;

  // Step 1: Call tg.ready() first so Telegram knows the app is ready
  if(tg){ tg.ready(); tg.expand(); }

  // Step 2: Wait for Telegram to fully inject user data (up to 3 seconds)
  let tgUser = tg ? await waitForTelegramUser(tg, 3000) : null;

  // Step 3: Set myTelegramId from Telegram user
  if(tgUser?.id){
    myTelegramId = tgUser.id;
    sessionStorage.setItem('uid', String(myTelegramId));
  }

  // Step 4: Fallback — sessionStorage from previous index.html login
  if(!myTelegramId){
    const savedId = sessionStorage.getItem('uid');
    if(savedId && !isNaN(parseInt(savedId))){
      myTelegramId = parseInt(savedId);
    }
  }

  // Step 5: Last resort — call /api/auth with initData string
  if(!myTelegramId && tg?.initData){
    try {
      const r = await fetch(BACKEND+'/api/auth', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({initData: tg.initData})
      });
      const d = await r.json();
      if(d?.telegramId){
        myTelegramId = d.telegramId;
        sessionStorage.setItem('uid', String(myTelegramId));
      }
    } catch(e){ console.error('initData auth err:', e); }
  }

  // Step 6: No ID found — show friendly error
  if(!myTelegramId){
    hideLdr();
    showError('Telegram Bot မှ /agent command နှိပ်ပြီး ဤ Panel ကိုဖွင့်ပါ');
    return;
  }

  // Step 7: Load agent panel data
  try {
    agentData = await api('/api/agent/panel');
    hideLdr();
    render();
  } catch(e){
    hideLdr();
    const msg = e.message || '';
    if(msg.includes('agent') || msg.includes('Agent') || msg.includes('မဟုတ်') || msg.includes('403')){
      showNotAgent();
    } else {
      showError('ဆာဗာ ချိတ်ဆက်မှု မအောင်မြင်ပါ: ' + msg);
    }
  }
}

function hideLdr(){
  document.getElementById('ldr').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function showError(msg){
  document.getElementById('ldr').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('app').innerHTML = `
    <div class="not-agent">
      <div class="na-icon">⚠️</div>
      <div class="na-title">Error</div>
      <div class="na-sub">${msg}</div>
    </div>`;
}

function showNotAgent(){
  document.getElementById('app').innerHTML = `
    <div class="not-agent">
      <div class="na-icon">🚫</div>
      <div class="na-title">Agent မဟုတ်သေးပါ</div>
      <div class="na-sub">Admin မှ Agent အဖြစ် ခွင့်ပြုမှ ဤ Panel ကို အသုံးပြုနိုင်မည်ဖြစ်သည်</div>
    </div>`;
}

function render(){
  const d = agentData;
  const refLink = BACKEND.replace('tiktocbackend','tictokfrontend').replace('onrender.com','vercel.app')
    .replace('https://tiktocbackend-zktq.onrender.com', `https://t.me/${d.botUsername||'tictoe1_bot'}?start=${d.referralCode}`);
  const botLink = `https://t.me/${d.botUsername||'tictoe1_bot'}?start=${d.referralCode}`;

  const app = document.getElementById('app');
  app.innerHTML = `
    <!-- Header -->
    <div class="hdr">
      <div class="hdr-avatar">🎯</div>
      <div>
        <div class="hdr-name">${d.firstName||d.username||'Agent'}</div>
        <div class="hdr-role">✅ Verified Agent</div>
      </div>
      <div class="hdr-bal">
        <div class="hdr-bal-val">${d.balance.toLocaleString()}</div>
        <div class="hdr-bal-lbl">MMK လက်ကျန်</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val" style="color:var(--blu);">${d.totalReferrals||0}</div>
        <div class="stat-lbl">လက်အောက်ခံ</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:var(--grn);font-size:1rem;">${(d.totalEarned||0).toLocaleString()}</div>
        <div class="stat-lbl">ဆုကြေး (ကျပ်)</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:var(--ylw);">${d.completedBoxes||0}/10</div>
        <div class="stat-lbl">Box ပြီး</div>
      </div>
    </div>

    <!-- Referral -->
    <div class="ref-card">
      <div class="ref-title">🔗 ကိုယ်ပိုင် Referral Link</div>
      <div class="ref-link" id="refLinkTxt">${botLink}</div>
      <div class="ref-btns">
        <button class="btn btn-grn" style="flex:1;" onclick="copyText('${botLink}')">📋 Copy</button>
        <button class="btn btn-blu" style="flex:1;" onclick="shareLink('${botLink}')">📤 Share</button>
      </div>
    </div>

    <!-- Milestone Boxes -->
    <div class="sec-title">🏆 Milestone Boxes <span>ဆုကြေးစနစ်</span></div>
    <div class="box-grid" id="boxGrid"></div>

    <!-- Deposit Requests -->
    <div class="sec-title" style="margin-top:4px;">💰 ငွေဖြည့်သွင်းမှု တောင်းဆိုချက်များ <span id="depCount"></span></div>
    <div id="depList">
      <div style="text-align:center;padding:20px;color:var(--sub);">Loading...</div>
    </div>

    <!-- Sub-agents / Referrals -->
    <div class="sec-title" style="margin-top:4px;">👥 လက်အောက်ခံ Users <span id="subCount"></span></div>
    <div id="subList">
      <div style="text-align:center;padding:20px;color:var(--sub);">Loading...</div>
    </div>
  `;

  renderBoxes(d);
  loadDeposits();
  loadSubs();
}

function renderBoxes(d){
  const grid = document.getElementById('boxGrid');
  const milestones = d.milestones || {};
  const box2Done = milestones[2]?.claimed || false;

  grid.innerHTML = BOX_CONFIG.map(cfg => {
    const ms = milestones[cfg.box] || { current: 0, claimed: false };
    const isLoop = cfg.loop;
    const isLocked = isLoop && !box2Done;
    const pct = Math.min(100, Math.round((ms.current / cfg.people) * 100));
    const ready = ms.current >= cfg.people && !ms.claimed;
    const done = ms.claimed && !isLoop;
    const isCurrent = !done && !isLocked && ms.current > 0 && ms.current < cfg.people;

    let boxClass = 'ms-box';
    if(done) boxClass += ' completed';
    else if(isLocked) boxClass += ' locked';
    else if(isLoop && !isLocked) boxClass += ' loop-box';
    else if(isCurrent) boxClass += ' current';

    let btnHtml = '';
    if(isLocked){
      btnHtml = `<button class="claim-btn pending">🔒 Box 2 ပြီးမှ Unlock</button>`;
    } else if(done){
      btnHtml = `<button class="claim-btn done">✅ ပြီးပြီ</button>`;
    } else if(ready){
      btnHtml = `<button class="claim-btn ready" onclick="claimBox(${cfg.box})">🎁 ယူမည် ${fmtK(cfg.bonus)}</button>`;
    } else {
      const need = cfg.people - ms.current;
      btnHtml = `<button class="claim-btn pending">${need} ယောက် ထပ်လို</button>`;
    }

    const progColor = isLoop ? 'ylw' : (done ? 'full' : '');

    return `
      <div class="${boxClass}">
        ${isLoop ? '<div class="loop-badge">♾️ LOOP</div>' : ''}
        <div class="box-num">${cfg.label}</div>
        <div class="box-bonus ${done?'grn':''}">${fmtK(cfg.bonus)}</div>
        <div class="box-sub">${cfg.people} ယောက် × ${fmtK(cfg.perPerson)}</div>
        <div class="prog-wrap">
          <div class="prog-bar">
            <div class="prog-fill ${progColor}" style="width:${isLocked?0:pct}%"></div>
          </div>
          <div class="prog-txt">
            <span>${isLocked?'Locked':ms.current+'/'+cfg.people}</span>
            <span>${isLocked?'':pct+'%'}</span>
          </div>
        </div>
        ${btnHtml}
      </div>`;
  }).join('');
}

async function claimBox(boxNum){
  try {
    const res = await api('/api/agent/claim-box', {method:'POST', body:JSON.stringify({box:boxNum})});
    toast(`🎉 Box ${boxNum} ဆုကြေး ${(res.bonus||0).toLocaleString()} ကျပ် ရပြီ!`);
    agentData = await api('/api/agent/panel');
    renderBoxes(agentData);
    // Update balance in header
    document.querySelector('.hdr-bal-val').textContent = agentData.balance.toLocaleString();
    document.querySelector('.stat-box:nth-child(2) .stat-val').textContent = (agentData.totalEarned||0).toLocaleString();
    document.querySelector('.stat-box:nth-child(3) .stat-val').textContent = (agentData.completedBoxes||0)+'/10';
  } catch(e){
    toast(e.message, false);
  }
}

async function loadDeposits(){
  try {
    const deps = await api('/api/agent/deposits?status=pending');
    const el = document.getElementById('depList');
    const countEl = document.getElementById('depCount');
    if (!el) return;
    if (!deps.length){
      if(countEl) countEl.textContent = '(0)';
      el.innerHTML = `<div style="text-align:center;padding:18px;color:var(--sub);font-size:13px;">Pending တောင်းဆိုမှု မရှိသေးပါ</div>`;
      return;
    }
    if(countEl) countEl.textContent = `(${deps.length})`;
    el.innerHTML = deps.map(d => {
      const methodLabel = d.paymentMethod === 'wave' ? '🌊 Wave' : '📱 KPay';
      const dateStr = new Date(d.createdAt).toLocaleDateString('my', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      return `
        <div class="sub-card" id="dep-${d._id}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
            <div>
              <div class="sub-name">${esc(d.userName)}</div>
              <div class="sub-meta">${methodLabel} • ${esc(d.kpayName||'')} • ${dateStr}</div>
              <div class="sub-meta" style="margin-top:2px;">Txn: <code style="font-size:10px;color:#a78bfa;">${esc(d.transactionId)}</code></div>
            </div>
            <div class="sub-bal" style="flex-shrink:0;margin-left:10px;">${(d.amount||0).toLocaleString()} ကျပ်</div>
          </div>
          <div style="display:flex;gap:7px;">
            <button class="btn btn-grn" style="flex:1;padding:8px;font-size:12px;"
              onclick="confirmDeposit('${d._id}')">✅ အတည်ပြု</button>
            <button class="btn" style="flex:1;padding:8px;font-size:12px;background:rgba(245,69,101,.18);color:#f87171;"
              onclick="rejectDeposit('${d._id}')">❌ ပယ်ချ</button>
          </div>
        </div>`;
    }).join('');
  } catch(e){
    const el = document.getElementById('depList');
    if(el) el.innerHTML = `<div style="color:#f87171;padding:16px;text-align:center;">${esc(e.message)}</div>`;
  }
}

async function confirmDeposit(id){
  try {
    await api(`/api/agent/deposits/${id}/confirm`, {method:'POST', body:JSON.stringify({})});
    toast('✅ ငွေဖြည့်မှု အတည်ပြုပြီ!');
    const card = document.getElementById('dep-'+id);
    if(card) card.remove();
    // refresh deposit count
    const remaining = document.querySelectorAll('[id^="dep-"]').length;
    const countEl = document.getElementById('depCount');
    if(countEl) countEl.textContent = `(${remaining})`;
    if(remaining === 0){
      const el = document.getElementById('depList');
      if(el) el.innerHTML = `<div style="text-align:center;padding:18px;color:var(--sub);font-size:13px;">Pending တောင်းဆိုမှု မရှိသေးပါ</div>`;
    }
    // Refresh agent balance
    agentData = await api('/api/agent/panel');
    document.querySelector('.hdr-bal-val').textContent = agentData.balance.toLocaleString();
  } catch(e){ toast(e.message, false); }
}

async function rejectDeposit(id){
  try {
    await api(`/api/agent/deposits/${id}/reject`, {method:'POST', body:JSON.stringify({})});
    toast('❌ ငွေဖြည့်မှု ပယ်ချပြီ', false);
    const card = document.getElementById('dep-'+id);
    if(card) card.remove();
    const remaining = document.querySelectorAll('[id^="dep-"]').length;
    const countEl = document.getElementById('depCount');
    if(countEl) countEl.textContent = `(${remaining})`;
    if(remaining === 0){
      const el = document.getElementById('depList');
      if(el) el.innerHTML = `<div style="text-align:center;padding:18px;color:var(--sub);font-size:13px;">Pending တောင်းဆိုမှု မရှိသေးပါ</div>`;
    }
  } catch(e){ toast(e.message, false); }
}

async function loadSubs(){
  try {
    const data = await api('/api/agent/referrals');
    const el = document.getElementById('subList');
    document.getElementById('subCount').textContent = `(${data.total})`;
    if(!data.referrals.length){
      el.innerHTML = `<div style="text-align:center;padding:22px;color:var(--sub);font-size:13px;">လက်အောက်ခံ မရှိသေးပါ<br><small>Referral Link မျှဝေပါ</small></div>`;
      return;
    }
    el.innerHTML = data.referrals.map(u=>`
      <div class="sub-card">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div class="sub-name">${esc(u.name)}</div>
            <div class="sub-meta">@${esc(u.username||'-')} • ${new Date(u.joinedAt).toLocaleDateString()}</div>
          </div>
          <div class="sub-bal">${(u.balance||0).toLocaleString()} ကျပ်</div>
        </div>
      </div>`).join('');
  } catch(e){
    document.getElementById('subList').innerHTML = `<div style="color:#f87171;padding:16px;text-align:center;">Error: ${esc(e.message)}</div>`;
  }
}

function esc(s){ return(s||'').toString().replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

// ── Entry point: ensure Telegram WebApp script is loaded before init ──
function startApp(){
  if(window.Telegram?.WebApp){
    init();
  } else {
    // Script may still be loading, wait briefly
    setTimeout(()=>{ init(); }, 300);
  }
}
window.addEventListener('DOMContentLoaded', startApp);
</script>
