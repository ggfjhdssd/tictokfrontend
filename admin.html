<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>TicToeTic - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Nunito', sans-serif; box-sizing: border-box; }
        body { background: #0f0c29; min-height: 100vh; }
        .bg-anim { background: linear-gradient(135deg, #0f0c29, #1a1a3e, #0d0d1a); position: fixed; inset: 0; z-index: -1; }
        .glass { background: rgba(255,255,255,0.07); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; }
        .glass-light { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; }
        .btn { font-weight: 800; border-radius: 10px; padding: 10px 16px; cursor: pointer; border: none; transition: all 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-green { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; }
        .btn-red { background: linear-gradient(135deg, #eb3349, #f45c43); color: #fff; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .tab { padding: 10px 16px; font-weight: 800; color: rgba(255,255,255,0.5); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
        .tab.active { color: #a78bfa; border-bottom-color: #a78bfa; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .spin-anim { animation: spin 1s linear infinite; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(167,139,250,0.2); border-top: 3px solid #a78bfa; border-radius: 50%; }
        .stat-card { border-radius: 16px; padding: 16px; }
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; }
        .badge-pending { background: rgba(251,191,36,0.15); color: #fde68a; border: 1px solid rgba(251,191,36,0.3); }
        .badge-confirmed { background: rgba(52,211,153,0.15); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.3); }
        .badge-rejected { background: rgba(248,113,113,0.15); color: #fca5a5; border: 1px solid rgba(248,113,113,0.3); }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; margin-bottom: 12px; }

        #toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .toast-box { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .toast-success { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; }
        .toast-error { background: linear-gradient(135deg, #eb3349, #f45c43); color: #fff; }
    </style>
</head>
<body>
    <div class="bg-anim"></div>
    <div id="toast" style="display:none;"><div class="toast-box" id="toastBox"></div></div>

    <!-- Reject Modal -->
    <div id="rejectModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="glass p-6 w-full max-w-sm">
            <h3 class="text-white font-black text-lg mb-4">❌ ငြင်းပယ်အကြောင်းပြချက်</h3>
            <textarea id="rejectReason" class="w-full p-3 rounded-xl mb-4 text-white text-sm" rows="3"
                style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);outline:none;resize:none;"
                placeholder="အကြောင်းပြချက် (ချန်လှပ်နိုင်သည်)"></textarea>
            <div class="flex gap-3">
                <button onclick="closeRejectModal()" class="btn btn-primary flex-1">မပယ်တော့</button>
                <button onclick="confirmReject()" class="btn btn-red flex-1">❌ ငြင်းပယ်မည်</button>
            </div>
        </div>
    </div>

    <div class="max-w-2xl mx-auto p-4 pb-8">
        
        <!-- Header -->
        <div class="glass p-5 mb-4 fade-in">
            <div class="flex items-center justify-between mb-3">
                <div>
                    <h1 class="text-white font-black text-2xl">👑 Admin Panel</h1>
                    <p class="text-xs mt-1" style="color:rgba(255,255,255,0.5);">TicToeTic Management</p>
                </div>
                <button onclick="loadAll()" class="p-2 rounded-xl" style="background:rgba(255,255,255,0.08);" id="refreshBtn">
                    <span id="refreshIcon">🔄</span>
                </button>
            </div>
            <div id="authStatus" class="text-yellow-300 text-sm text-center py-2">
                <div class="spinner spin-anim mx-auto mb-2"></div>
                Loading...
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 gap-3 mb-4" id="statsGrid" style="display:none;">
            <div class="stat-card" style="background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(37,99,235,0.1));border:1px solid rgba(59,130,246,0.3);">
                <div class="text-xs mb-1" style="color:rgba(255,255,255,0.6);">👥 စုစုပေါင်းသုံးသူ</div>
                <div class="text-2xl font-black text-blue-300" id="statUsers">0</div>
            </div>
            <div class="stat-card" style="background:linear-gradient(135deg,rgba(52,211,153,0.2),rgba(16,185,129,0.1));border:1px solid rgba(52,211,153,0.3);">
                <div class="text-xs mb-1" style="color:rgba(255,255,255,0.6);">🎮 ပြီးသောဂိမ်း</div>
                <div class="text-2xl font-black text-green-300" id="statGames">0</div>
            </div>
            <div class="stat-card" style="background:linear-gradient(135deg,rgba(251,191,36,0.2),rgba(245,158,11,0.1));border:1px solid rgba(251,191,36,0.3);">
                <div class="text-xs mb-1" style="color:rgba(255,255,255,0.6);">💰 စောင့်ဆိုင်းငွေသွင်း</div>
                <div class="text-2xl font-black text-yellow-300" id="statPendingDep">0</div>
            </div>
            <div class="stat-card" style="background:linear-gradient(135deg,rgba(248,113,113,0.2),rgba(239,68,68,0.1));border:1px solid rgba(248,113,113,0.3);">
                <div class="text-xs mb-1" style="color:rgba(255,255,255,0.6);">💸 စောင့်ဆိုင်းငွေထုတ်</div>
                <div class="text-2xl font-black text-red-300" id="statPendingWith">0</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="glass fade-in">
            <div class="flex border-b overflow-x-auto" style="border-color:rgba(255,255,255,0.1);">
                <div class="tab active" onclick="switchTab('deposits')" id="tabDeposits">💰 ငွေသွင်း</div>
                <div class="tab" onclick="switchTab('withdrawals')" id="tabWithdrawals">💸 ငွေထုတ်</div>
            </div>

            <div class="p-4">
                <!-- Loading -->
                <div id="loadingDiv" class="text-center py-8">
                    <div class="spinner spin-anim mx-auto mb-3"></div>
                    <p class="text-xs" style="color:rgba(255,255,255,0.5);">ဒေတာများ ရယူနေသည်...</p>
                </div>

                <!-- Deposits -->
                <div id="depositsContent" style="display:none;">
                    <div id="depositsList"></div>
                </div>

                <!-- Withdrawals -->
                <div id="withdrawalsContent" style="display:none;">
                    <div id="withdrawalsList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        const API_URL = 'https://tiktocbackend.onrender.com';
        let adminId = null;
        let currentTab = 'deposits';
        let rejectType = null;
        let rejectId = null;

        // Toast
        let toastTimer;
        function showToast(msg, type = 'info', dur = 3000) {
            const t = document.getElementById('toast');
            const b = document.getElementById('toastBox');
            b.textContent = msg;
            b.className = `toast-box toast-${type}`;
            t.style.display = 'block';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.style.display = 'none', dur);
        }

        // Tab
        function switchTab(tab) {
            currentTab = tab;
            ['deposits', 'withdrawals'].forEach(t => {
                document.getElementById(`tab${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.toggle('active', t === tab);
                document.getElementById(`${t}Content`).style.display = t === tab ? 'block' : 'none';
            });
        }

        // Init
        async function init() {
            try {
                const initData = tg?.initData || '';
                const body = initData ? { initData } : { telegramId: 12345 };
                const resp = await fetch(`${API_URL}/api/auth`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const user = await resp.json();
                adminId = user.telegramId;

                // Check admin
                const statsResp = await fetch(`${API_URL}/api/admin/stats?adminId=${adminId}`);
                if (!statsResp.ok) {
                    document.getElementById('authStatus').innerHTML = '<span class="text-red-400">⛔ Admin ခွင့်ပြုချက်မရှိပါ</span>';
                    return;
                }

                document.getElementById('authStatus').style.display = 'none';
                document.getElementById('statsGrid').style.display = 'grid';

                const stats = await statsResp.json();
                document.getElementById('statUsers').textContent = stats.totalUsers || 0;
                document.getElementById('statGames').textContent = stats.totalGames || 0;
                document.getElementById('statPendingDep').textContent = stats.pendingDeposits || 0;
                document.getElementById('statPendingWith').textContent = stats.pendingWithdrawals || 0;

                await loadPending();
            } catch (e) {
                document.getElementById('authStatus').innerHTML = `<span class="text-red-400">❌ Error: ${e.message}</span>`;
            }
        }

        async function loadAll() {
            document.getElementById('refreshIcon').className = 'spin-anim';
            document.getElementById('refreshIcon').textContent = '⟳';
            await loadPending();
            // Reload stats
            try {
                const s = await fetch(`${API_URL}/api/admin/stats?adminId=${adminId}`);
                const stats = await s.json();
                document.getElementById('statPendingDep').textContent = stats.pendingDeposits || 0;
                document.getElementById('statPendingWith').textContent = stats.pendingWithdrawals || 0;
            } catch (e) {}
            document.getElementById('refreshIcon').className = '';
            document.getElementById('refreshIcon').textContent = '🔄';
        }

        async function loadPending() {
            if (!adminId) return;
            document.getElementById('loadingDiv').style.display = 'block';
            document.getElementById('depositsContent').style.display = 'none';
            document.getElementById('withdrawalsContent').style.display = 'none';

            try {
                const resp = await fetch(`${API_URL}/api/admin/pending?adminId=${adminId}`);
                if (!resp.ok) throw new Error('Unauthorized');
                const data = await resp.json();
                renderDeposits(data.deposits || []);
                renderWithdrawals(data.withdrawals || []);
            } catch (e) {
                showToast('❌ ' + e.message, 'error');
            }

            document.getElementById('loadingDiv').style.display = 'none';
            switchTab(currentTab);
        }

        function formatDate(d) {
            if (!d) return '-';
            return new Date(d).toLocaleString('my-MM', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function renderDeposits(list) {
            const el = document.getElementById('depositsList');
            if (!list.length) {
                el.innerHTML = '<div class="text-center py-8 text-sm" style="color:rgba(255,255,255,0.4);">💰 ငွေသွင်း တောင်းဆိုမှု မရှိသေးပါ</div>';
                return;
            }
            el.innerHTML = list.map(d => `
                <div class="card fade-in">
                    <div class="flex items-start justify-between mb-2">
                        <div>
                            <div class="text-white font-black">${d.username || 'User' + d.userId}</div>
                            <div class="text-xs mt-0.5" style="color:rgba(255,255,255,0.5);">ID: ${d.userId}</div>
                        </div>
                        <div class="badge badge-pending">🕒 PENDING</div>
                    </div>
                    <div class="glass-light p-3 mb-3">
                        <div class="flex justify-between text-sm mb-1">
                            <span style="color:rgba(255,255,255,0.5);">ပမာဏ</span>
                            <span class="text-green-400 font-black">${d.amount.toLocaleString()} MMK</span>
                        </div>
                        <div class="flex justify-between text-sm mb-1">
                            <span style="color:rgba(255,255,255,0.5);">KPay Name</span>
                            <span class="text-white font-bold">${d.kpayName || '-'}</span>
                        </div>
                        <div class="flex justify-between text-sm mb-1">
                            <span style="color:rgba(255,255,255,0.5);">Txn ID</span>
                            <span class="text-yellow-300 font-mono text-xs">${d.transactionId}</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span style="color:rgba(255,255,255,0.5);">ရက်</span>
                            <span class="text-white text-xs">${formatDate(d.createdAt)}</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="confirmDeposit('${d._id}')" class="btn btn-green flex-1">✅ အတည်ပြု</button>
                        <button onclick="openRejectModal('deposit','${d._id}')" class="btn btn-red flex-1">❌ ငြင်းပယ်</button>
                    </div>
                </div>
            `).join('');
        }

        function renderWithdrawals(list) {
            const el = document.getElementById('withdrawalsList');
            if (!list.length) {
                el.innerHTML = '<div class="text-center py-8 text-sm" style="color:rgba(255,255,255,0.4);">💸 ငွေထုတ် တောင်းဆိုမှု မရှိသေးပါ</div>';
                return;
            }
            el.innerHTML = list.map(w => `
                <div class="card fade-in">
                    <div class="flex items-start justify-between mb-2">
                        <div>
                            <div class="text-white font-black">${w.username || 'User' + w.userId}</div>
                            <div class="text-xs mt-0.5" style="color:rgba(255,255,255,0.5);">ID: ${w.userId} • Balance: ${(w.userBalance || 0).toLocaleString()} MMK</div>
                        </div>
                        <div class="badge badge-pending">🕒 PENDING</div>
                    </div>
                    <div class="glass-light p-3 mb-3">
                        <div class="flex justify-between text-sm mb-1">
                            <span style="color:rgba(255,255,255,0.5);">ပမာဏ</span>
                            <span class="text-red-400 font-black">${w.amount.toLocaleString()} MMK</span>
                        </div>
                        <div class="flex justify-between text-sm mb-1">
                            <span style="color:rgba(255,255,255,0.5);">KPay Name</span>
                            <span class="text-white font-bold">${w.kpayName || '-'}</span>
                        </div>
                        <div class="flex justify-between text-sm mb-1">
                            <span style="color:rgba(255,255,255,0.5);">KPay Number</span>
                            <span class="text-yellow-300 font-bold">${w.kpayNumber || '-'}</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span style="color:rgba(255,255,255,0.5);">ရက်</span>
                            <span class="text-white text-xs">${formatDate(w.createdAt)}</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="confirmWithdrawal('${w._id}')" class="btn btn-green flex-1">✅ အတည်ပြု</button>
                        <button onclick="openRejectModal('withdrawal','${w._id}')" class="btn btn-red flex-1">❌ ငြင်းပယ်</button>
                    </div>
                </div>
            `).join('');
        }

        // Actions
        async function confirmDeposit(id) {
            if (!confirm('ဤငွေသွင်းကို အတည်ပြုမည်လား?')) return;
            try {
                const r = await fetch(`${API_URL}/api/admin/confirm-deposit`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminId, depositId: id })
                });
                const d = await r.json();
                if (d.success) { showToast('✅ ငွေသွင်း အတည်ပြုပြီး', 'success'); await loadAll(); }
                else showToast('❌ ' + d.error, 'error');
            } catch (e) { showToast('❌ Error: ' + e.message, 'error'); }
        }

        async function confirmWithdrawal(id) {
            if (!confirm('ဤငွေထုတ်ကို အတည်ပြုမည်လား?')) return;
            try {
                const r = await fetch(`${API_URL}/api/admin/confirm-withdrawal`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminId, withdrawalId: id })
                });
                const d = await r.json();
                if (d.success) { showToast('✅ ငွေထုတ် အတည်ပြုပြီး', 'success'); await loadAll(); }
                else showToast('❌ ' + d.error, 'error');
            } catch (e) { showToast('❌ Error: ' + e.message, 'error'); }
        }

        function openRejectModal(type, id) {
            rejectType = type; rejectId = id;
            document.getElementById('rejectReason').value = '';
            document.getElementById('rejectModal').classList.remove('hidden');
        }

        function closeRejectModal() {
            document.getElementById('rejectModal').classList.add('hidden');
            rejectType = null; rejectId = null;
        }

        async function confirmReject() {
            const reason = document.getElementById('rejectReason').value.trim() || 'No reason provided';
            const endpoint = rejectType === 'deposit' ? 'reject-deposit' : 'reject-withdrawal';
            const body = rejectType === 'deposit'
                ? { adminId, depositId: rejectId, reason }
                : { adminId, withdrawalId: rejectId, reason };

            try {
                const r = await fetch(`${API_URL}/api/admin/${endpoint}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const d = await r.json();
                if (d.success) { showToast('❌ ငြင်းပယ်ပြီး', 'success'); await loadAll(); }
                else showToast('❌ ' + d.error, 'error');
            } catch (e) { showToast('❌ Error: ' + e.message, 'error'); }

            closeRejectModal();
        }

        // Auto-refresh every 30s
        setInterval(() => { if (document.visibilityState === 'visible' && adminId) loadAll(); }, 30000);

        init();
    </script>
</body>
</html>
