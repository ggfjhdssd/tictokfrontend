<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicToeTic - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slideIn {
            animation: slideIn 0.3s ease-out;
        }
        .tab-active {
            border-bottom: 3px solid #8B5CF6;
            color: #8B5CF6;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 min-h-screen p-4">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl p-6 mb-6 border border-white/20">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-white">👑 Admin Panel</h1>
                    <p class="text-purple-200 mt-2">စီမံခန့်ခွဲသူ ထိန်းချုပ်ခန်း</p>
                </div>
                <div class="bg-purple-500/30 rounded-full p-3">
                    <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-6-3a2 2 0 11-4 0 2 2 0 014 0zm-2 4a5 5 0 00-4.546 2.916A5.986 5.986 0 0010 16a5.986 5.986 0 004.546-2.084A5 5 0 0010 11z" clip-rule="evenodd"></path>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl p-4 text-white">
                <p class="text-sm opacity-90">စုစုပေါင်းအသုံးပြုသူ</p>
                <p id="totalUsers" class="text-2xl font-bold">0</p>
            </div>
            <div class="bg-gradient-to-br from-green-500 to-green-600 rounded-2xl p-4 text-white">
                <p class="text-sm opacity-90">ငွေသွင်းမှုများ</p>
                <p id="totalDeposits" class="text-2xl font-bold">0</p>
            </div>
            <div class="bg-gradient-to-br from-yellow-500 to-yellow-600 rounded-2xl p-4 text-white">
                <p class="text-sm opacity-90">ငွေသွင်းပမာဏ</p>
                <p id="totalDepositAmount" class="text-2xl font-bold">0</p>
            </div>
            <div class="bg-gradient-to-br from-red-500 to-red-600 rounded-2xl p-4 text-white">
                <p class="text-sm opacity-90">ငွေထုတ်ပမာဏ</p>
                <p id="totalWithdrawalAmount" class="text-2xl font-bold">0</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl p-6 border border-white/20">
            <div class="flex space-x-4 border-b border-white/20 mb-6">
                <button id="tabDeposits" class="tab-btn px-4 py-2 text-white font-semibold transition-all tab-active">
                    💰 ငွေသွင်းရန် စောင့်ဆိုင်း
                </button>
                <button id="tabWithdrawals" class="tab-btn px-4 py-2 text-white/70 hover:text-white font-semibold transition-all">
                    💸 ငွေထုတ်ရန် စောင့်ဆိုင်း
                </button>
            </div>

            <!-- Deposits Tab Content -->
            <div id="depositsContent" class="tab-content">
                <h2 class="text-xl font-bold text-white mb-4">🕒 ငွေသွင်းရန် စောင့်ဆိုင်းနေသော တောင်းဆိုမှုများ</h2>
                <div id="depositsList" class="space-y-3">
                    <!-- Dynamic content -->
                </div>
            </div>

            <!-- Withdrawals Tab Content -->
            <div id="withdrawalsContent" class="tab-content hidden">
                <h2 class="text-xl font-bold text-white mb-4">🕒 ငွေထုတ်ရန် စောင့်ဆိုင်းနေသော တောင်းဆိုမှုများ</h2>
                <div id="withdrawalsList" class="space-y-3">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>

        <!-- Reject Modal -->
        <div id="rejectModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
            <div class="bg-gray-800 rounded-2xl p-6 max-w-md w-full">
                <h3 class="text-xl font-bold text-white mb-4">Reject Reason</h3>
                <textarea id="rejectReason" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-xl text-white mb-4" rows="3" placeholder="Enter reason for rejection..."></textarea>
                <div class="flex space-x-3">
                    <button id="confirmReject" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-2 rounded-lg">Reject</button>
                    <button id="cancelReject" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 rounded-lg">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const adminId = tg.initDataUnsafe?.user?.id;
        let currentAction = null;
        let currentId = null;

        if (!adminId) {
            tg.showAlert('Not authenticated');
        }

        // Check if user is admin (server will verify)
        loadPending();
        loadStats();

        // Tabs
        document.getElementById('tabDeposits').addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active', 'text-white'));
            document.getElementById('tabDeposits').classList.add('tab-active', 'text-white');
            document.getElementById('tabDeposits').classList.remove('text-white/70');
            document.getElementById('tabWithdrawals').classList.remove('tab-active', 'text-white');
            document.getElementById('tabWithdrawals').classList.add('text-white/70');
            
            document.getElementById('depositsContent').classList.remove('hidden');
            document.getElementById('withdrawalsContent').classList.add('hidden');
        });

        document.getElementById('tabWithdrawals').addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active', 'text-white'));
            document.getElementById('tabWithdrawals').classList.add('tab-active', 'text-white');
            document.getElementById('tabWithdrawals').classList.remove('text-white/70');
            document.getElementById('tabDeposits').classList.remove('tab-active', 'text-white');
            document.getElementById('tabDeposits').classList.add('text-white/70');
            
            document.getElementById('withdrawalsContent').classList.remove('hidden');
            document.getElementById('depositsContent').classList.add('hidden');
        });

        // Load pending requests
        async function loadPending() {
            try {
                const response = await fetch(`https://tiktocbackend.onrender.com/api/admin/pending?adminId=${adminId}`);
                if (response.status === 403) {
                    tg.showAlert('Unauthorized access');
                    return;
                }
                const data = await response.json();
                renderDeposits(data.deposits);
                renderWithdrawals(data.withdrawals);
            } catch (error) {
                console.error('Error loading pending:', error);
            }
        }

        // Load stats
        async function loadStats() {
            try {
                const response = await fetch(`https://tiktocbackend.onrender.com/api/admin/stats?adminId=${adminId}`);
                const data = await response.json();
                
                document.getElementById('totalUsers').textContent = data.totalUsers || 0;
                document.getElementById('totalDeposits').textContent = data.totalDeposits || 0;
                document.getElementById('totalDepositAmount').textContent = data.totalDepositAmount.toLocaleString() + ' MMK';
                document.getElementById('totalWithdrawalAmount').textContent = data.totalWithdrawalAmount.toLocaleString() + ' MMK';
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function renderDeposits(deposits) {
            const container = document.getElementById('depositsList');
            
            if (deposits.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-white/50">No pending deposits</div>';
                return;
            }

            let html = '';
            deposits.forEach(d => {
                html += `
                    <div class="bg-white/5 rounded-xl p-4 border border-white/10 animate-slideIn">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <p class="text-white font-semibold">@${d.username || 'Unknown'}</p>
                                <p class="text-sm text-purple-300">ID: ${d.userId}</p>
                            </div>
                            <span class="bg-yellow-500/20 text-yellow-400 px-3 py-1 rounded-full text-sm">Pending</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mb-3 text-sm">
                            <p class="text-purple-200">KPay: <span class="text-white">${d.kpayName}</span></p>
                            <p class="text-purple-200">Txn: <span class="text-white">${d.transactionId}</span></p>
                            <p class="text-purple-200">ပမာဏ: <span class="text-green-400 font-bold">${d.amount} MMK</span></p>
                            <p class="text-purple-200">လက်ကျန်: <span class="text-white">${d.userBalance} MMK</span></p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="confirmDeposit('${d._id}')" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-2 rounded-lg transition-all">
                                ✅ Confirm
                            </button>
                            <button onclick="showRejectModal('deposit', '${d._id}')" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-2 rounded-lg transition-all">
                                ❌ Reject
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function renderWithdrawals(withdrawals) {
            const container = document.getElementById('withdrawalsList');
            
            if (withdrawals.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-white/50">No pending withdrawals</div>';
                return;
            }

            let html = '';
            withdrawals.forEach(w => {
                html += `
                    <div class="bg-white/5 rounded-xl p-4 border border-white/10 animate-slideIn">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <p class="text-white font-semibold">@${w.username || 'Unknown'}</p>
                                <p class="text-sm text-purple-300">ID: ${w.userId}</p>
                            </div>
                            <span class="bg-yellow-500/20 text-yellow-400 px-3 py-1 rounded-full text-sm">Pending</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mb-3 text-sm">
                            <p class="text-purple-200">KPay: <span class="text-white">${w.kpayName}</span></p>
                            <p class="text-purple-200">နံပါတ်: <span class="text-white">${w.kpayNumber}</span></p>
                            <p class="text-purple-200">ပမာဏ: <span class="text-red-400 font-bold">${w.amount} MMK</span></p>
                            <p class="text-purple-200">လက်ကျန်: <span class="text-white">${w.userBalance} MMK</span></p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="confirmWithdrawal('${w._id}')" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-2 rounded-lg transition-all">
                                ✅ Confirm
                            </button>
                            <button onclick="showRejectModal('withdrawal', '${w._id}')" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-2 rounded-lg transition-all">
                                ❌ Reject
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Modal functions
        function showRejectModal(type, id) {
            currentAction = type;
            currentId = id;
            document.getElementById('rejectModal').classList.remove('hidden');
        }

        document.getElementById('cancelReject').addEventListener('click', () => {
            document.getElementById('rejectModal').classList.add('hidden');
            document.getElementById('rejectReason').value = '';
            currentAction = null;
            currentId = null;
        });

        document.getElementById('confirmReject').addEventListener('click', async () => {
            const reason = document.getElementById('rejectReason').value.trim();
            
            if (currentAction === 'deposit') {
                await rejectDeposit(currentId, reason);
            } else if (currentAction === 'withdrawal') {
                await rejectWithdrawal(currentId, reason);
            }
            
            document.getElementById('rejectModal').classList.add('hidden');
            document.getElementById('rejectReason').value = '';
        });

        // Confirm deposit
        window.confirmDeposit = async (depositId) => {
            if (!confirm('Are you sure you want to confirm this deposit?')) return;
            
            try {
                const response = await fetch('https://tiktocbackend.onrender.com/api/admin/confirm-deposit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminId, depositId })
                });
                
                if (response.ok) {
                    tg.showAlert('Deposit confirmed successfully');
                    loadPending();
                    loadStats();
                } else {
                    const error = await response.json();
                    tg.showAlert('Error: ' + error.error);
                }
            } catch (error) {
                console.error('Error:', error);
                tg.showAlert('Network error');
            }
        };

        // Reject deposit
        window.rejectDeposit = async (depositId, reason) => {
            try {
                const response = await fetch('https://tiktocbackend.onrender.com/api/admin/reject-deposit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminId, depositId, reason })
                });
                
                if (response.ok) {
                    tg.showAlert('Deposit rejected');
                    loadPending();
                    loadStats();
                } else {
                    const error = await response.json();
                    tg.showAlert('Error: ' + error.error);
                }
            } catch (error) {
                console.error('Error:', error);
                tg.showAlert('Network error');
            }
        };

        // Confirm withdrawal
        window.confirmWithdrawal = async (withdrawalId) => {
            if (!confirm('Are you sure you want to confirm this withdrawal?')) return;
            
            try {
                const response = await fetch('https://tiktocbackend.onrender.com/api/admin/confirm-withdrawal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminId, withdrawalId })
                });
                
                if (response.ok) {
                    tg.showAlert('Withdrawal confirmed successfully');
                    loadPending();
                    loadStats();
                } else {
                    const error = await response.json();
                    tg.showAlert('Error: ' + error.error);
                }
            } catch (error) {
                console.error('Error:', error);
                tg.showAlert('Network error');
            }
        };

        // Reject withdrawal
        window.rejectWithdrawal = async (withdrawalId, reason) => {
            try {
                const response = await fetch('https://tiktocbackend.onrender.com/api/admin/reject-withdrawal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminId, withdrawalId, reason })
                });
                
                if (response.ok) {
                    tg.showAlert('Withdrawal rejected');
                    loadPending();
                    loadStats();
                } else {
                    const error = await response.json();
                    tg.showAlert('Error: ' + error.error);
                }
            } catch (error) {
                console.error('Error:', error);
                tg.showAlert('Network error');
            }
        };

        // Refresh every 30 seconds
        setInterval(() => {
            loadPending();
            loadStats();
        }, 30000);
    </script>
</body>
</html>
