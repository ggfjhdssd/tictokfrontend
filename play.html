<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TicToeTic · ကစားနေဆဲ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap');
    * { box-sizing: border-box; }
    body { font-family: 'Padauk', sans-serif; background: #080e1a; min-height: 100vh; color: #e2e8f0; }
    .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    .hidden { display: none !important; }
    .cell {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      font-weight: 900;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 2px solid rgba(255,255,255,0.08);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .cell:hover:not(.taken) { background: rgba(255,255,255,0.12); transform: scale(1.03); }
    .cell:active:not(.taken) { transform: scale(0.95); }
    .cell.taken { cursor: default; }
    .cell-x { color: #fbbf24; text-shadow: 0 0 12px rgba(251,191,36,0.6); border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.08); }
    .cell-o { color: #22d3ee; text-shadow: 0 0 12px rgba(34,211,238,0.6); border-color: rgba(34,211,238,0.3); background: rgba(34,211,238,0.08); }
    .cell-win { background: rgba(255,215,0,0.2) !important; border-color: #fbbf24 !important; animation: win-pulse 0.5s ease infinite alternate; }
    @keyframes win-pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
    .timer-bar { height: 4px; border-radius: 4px; transition: width 0.1s linear; }
    .waiting-dot { animation: waiting-bounce 1.4s infinite; }
    .waiting-dot:nth-child(2) { animation-delay: 0.2s; }
    .waiting-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes waiting-bounce { 0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; } 40% { transform: scale(1.2); opacity: 1; } }
    .modal-overlay { background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
    .btn-gold { background: linear-gradient(135deg, #f59e0b, #d97706); }
  </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">
  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="glass rounded-2xl p-3 mb-4 flex justify-between items-center">
      <button id="exitBtn" class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center hover:bg-white/20 active:scale-95 transition">
        <i class="fas fa-arrow-left text-sm"></i>
      </button>
      <div class="text-center">
        <p class="text-xs text-gray-400">ဂိမ်း ID</p>
        <p id="gameIdDisplay" class="font-bold text-xs text-amber-400">-</p>
      </div>
      <div class="text-right">
        <p class="text-xs text-gray-400">ကျန်ချိန်</p>
        <p id="timerDisplay" class="font-black text-lg text-cyan-400">5:00</p>
      </div>
    </div>

    <!-- Waiting Screen -->
    <div id="waitingScreen" class="glass rounded-3xl p-10 text-center">
      <div class="flex justify-center gap-2 mb-6">
        <div class="w-3 h-3 rounded-full bg-amber-400 waiting-dot"></div>
        <div class="w-3 h-3 rounded-full bg-amber-400 waiting-dot"></div>
        <div class="w-3 h-3 rounded-full bg-amber-400 waiting-dot"></div>
      </div>
      <p class="text-xl font-black mb-2 text-white">ကစားသူ ရှာနေသည်</p>
      <p class="text-sm text-gray-400 mb-6">မတွေ့ပါက Bot နှင့် ကစားမည်</p>
      <div class="w-full bg-white/10 rounded-full h-2 overflow-hidden">
        <div id="waitingProgress" class="timer-bar bg-gradient-to-r from-amber-400 to-red-400" style="width:0%"></div>
      </div>
      <p id="waitingCountdown" class="text-xs text-gray-500 mt-2">30 စက္ကန့်</p>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="hidden">
      <!-- Players -->
      <div class="flex justify-between items-center mb-3">
        <div class="glass rounded-xl p-3 flex-1 mr-2 text-center">
          <p class="text-xs text-gray-400">သင် (X)</p>
          <p id="myName" class="font-bold text-amber-400 text-sm truncate">-</p>
        </div>
        <div class="text-2xl font-black text-gray-500 px-2">VS</div>
        <div class="glass rounded-xl p-3 flex-1 ml-2 text-center">
          <p class="text-xs text-gray-400">ပြိုင်ဘက် (O)</p>
          <p id="opponentName" class="font-bold text-cyan-400 text-sm truncate">-</p>
        </div>
      </div>

      <!-- Turn + Timer Bar -->
      <div class="glass rounded-2xl p-3 mb-3 text-center">
        <p id="turnText" class="font-black text-base mb-2">-</p>
        <div class="w-full bg-white/10 rounded-full h-1.5 overflow-hidden">
          <div id="moveTimer" class="timer-bar bg-gradient-to-r from-amber-400 to-red-400" style="width:100%"></div>
        </div>
      </div>

      <!-- 5x5 Board -->
      <div class="glass rounded-2xl p-3 mb-3">
        <div id="board" class="grid grid-cols-5 gap-2">
          <!-- JS-generated -->
        </div>
      </div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverModal" class="hidden fixed inset-0 modal-overlay flex items-end justify-center z-50 p-4">
      <div class="glass rounded-3xl p-6 w-full max-w-sm text-center mb-4" style="animation: slideUp 0.4s ease">
        <div id="gameOverIcon" class="text-7xl mb-4"></div>
        <h2 id="gameOverTitle" class="text-2xl font-black mb-2">-</h2>
        <p id="gameOverAmount" class="text-3xl font-black mb-6">-</p>
        <div class="flex gap-3">
          <button id="playAgainBtn" class="flex-1 btn-gold text-black font-black py-4 rounded-xl text-lg active:scale-95 transition-transform">
            ထပ်ဆော့မည်
          </button>
          <button id="exitGameBtn" class="flex-1 bg-white/10 hover:bg-white/20 py-4 rounded-xl font-bold transition active:scale-95">
            ထွက်မည်
          </button>
        </div>
      </div>
    </div>
  </div>

  <style>
    @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.expand(); tg.ready(); tg.setHeaderColor('#080e1a'); }

    const urlParams = new URLSearchParams(window.location.search);
    const gameId = urlParams.get('gameId');
    const joinMode = urlParams.get('join') === 'true';
    const initData = tg?.initDataUnsafe?.user;
    const telegramId = initData?.id?.toString() || 'test_' + Math.random().toString(36).substr(2,6);
    const myDisplayName = initData?.username || initData?.first_name || 'Player';

    if (!gameId) { window.location.href = '/index.html'; }

    const BACKEND_URL = 'https://your-backend.onrender.com'; // ← Render URL ပြောင်းပါ
    const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
    const $ = id => document.getElementById(id);

    let currentBoard = Array(5).fill(null).map(() => Array(5).fill(''));
    let currentTurn = null;
    let mySymbol = 'X';
    let moveTimerInterval = null;
    let gameTimerInterval = null;
    let gameTimeLeft = 300;
    let gameEnded = false;

    $('gameIdDisplay').textContent = gameId?.substring(0, 16) + '...';
    $('myName').textContent = myDisplayName;

    // Init board
    function initBoard() {
      const boardEl = $('board');
      boardEl.innerHTML = '';
      for (let r = 0; r < 5; r++) {
        for (let c = 0; c < 5; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.row = r;
          cell.dataset.col = c;
          cell.addEventListener('click', handleCellClick);
          boardEl.appendChild(cell);
        }
      }
    }

    function handleCellClick(e) {
      const r = parseInt(e.target.dataset.row);
      const c = parseInt(e.target.dataset.col);
      if (currentTurn !== telegramId || currentBoard[r][c] || gameEnded) return;
      socket.emit('makeMove', { gameId, telegramId, row: r, col: c });
    }

    function renderBoard() {
      const cells = $('board').children;
      for (let r = 0; r < 5; r++) {
        for (let c = 0; c < 5; c++) {
          const cell = cells[r * 5 + c];
          const val = currentBoard[r][c];
          cell.textContent = val;
          cell.className = 'cell' + (val === 'X' ? ' cell-x taken' : val === 'O' ? ' cell-o taken' : '');
        }
      }
    }

    function highlightWinCells(board, winSymbol) {
      const cells = $('board').children;
      const dirs = [[1,0],[0,1],[1,1],[1,-1]];
      for (let r = 0; r < 5; r++) for (let c = 0; c < 5; c++) {
        if (board[r][c] !== winSymbol) continue;
        for (const [dr, dc] of dirs) {
          let coords = [[r,c]];
          for (let i=1;i<4;i++){const nr=r+dr*i,nc=c+dc*i;if(nr<0||nr>=5||nc<0||nc>=5||board[nr][nc]!==winSymbol)break;coords.push([nr,nc]);}
          for (let i=1;i<4;i++){const nr=r-dr*i,nc=c-dc*i;if(nr<0||nr>=5||nc<0||nc>=5||board[nr][nc]!==winSymbol)break;coords.push([nr,nc]);}
          if (coords.length >= 4) { coords.forEach(([rr,cc]) => cells[rr*5+cc].classList.add('cell-win')); return; }
        }
      }
    }

    function startGameTimer() {
      clearInterval(gameTimerInterval);
      gameTimeLeft = 300;
      gameTimerInterval = setInterval(() => {
        gameTimeLeft--;
        const m = Math.floor(gameTimeLeft/60), s = gameTimeLeft%60;
        $('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
        if (gameTimeLeft <= 30) $('timerDisplay').classList.add('text-red-400');
        if (gameTimeLeft <= 0) { clearInterval(gameTimerInterval); if (!gameEnded) socket.emit('gameTimeout', { gameId, telegramId }); }
      }, 1000);
    }

    function startMoveTimer(seconds) {
      clearInterval(moveTimerInterval);
      const bar = $('moveTimer');
      let timeLeft = seconds;
      bar.style.width = '100%';
      moveTimerInterval = setInterval(() => {
        timeLeft -= 0.1;
        bar.style.width = Math.max(0, (timeLeft/seconds)*100) + '%';
        if (timeLeft <= 0) {
          clearInterval(moveTimerInterval);
          if (!gameEnded) socket.emit('moveTimeout', { gameId, telegramId });
        }
      }, 100);
    }

    // Waiting progress
    let waitingLeft = 30;
    const waitInterval = setInterval(() => {
      waitingLeft--;
      $('waitingProgress').style.width = ((30 - waitingLeft) / 30 * 100) + '%';
      $('waitingCountdown').textContent = `${waitingLeft} စက္ကန့်`;
      if (waitingLeft <= 0) clearInterval(waitInterval);
    }, 1000);

    // Socket events
    socket.on('connect', () => {
      socket.emit('authenticate', { telegramId });
      if (joinMode) socket.emit('joinGame', { telegramId, gameId });
    });

    socket.on('gameMatched', (data) => {
      clearInterval(waitInterval);
      $('waitingScreen').classList.add('hidden');
      $('gameScreen').classList.remove('hidden');
      $('opponentName').textContent = data.opponent === 'bot' ? '🤖 AI Bot' : (data.opponent || 'Player');
      mySymbol = 'X';
      initBoard();
      startGameTimer();
    });

    socket.on('moveMade', (data) => {
      if (data.gameId !== gameId) return;
      currentBoard = data.board;
      currentTurn = data.currentTurn;
      renderBoard();

      if (currentTurn === telegramId) {
        $('turnText').textContent = '✨ သင့်အလှည့် (X)';
        $('turnText').className = 'font-black text-base mb-2 text-amber-400';
        startMoveTimer(5);
      } else {
        const isBot = currentTurn === 'bot';
        $('turnText').textContent = isBot ? '🤖 Bot အလှည့်' : '⏳ ပြိုင်ဘက်အလှည့်';
        $('turnText').className = 'font-black text-base mb-2 text-cyan-400';
        clearInterval(moveTimerInterval);
        $('moveTimer').style.width = '100%';
      }
    });

    socket.on('gameOver', (data) => {
      if (data.gameId !== gameId && data.gameId !== undefined) return;
      gameEnded = true;
      clearInterval(moveTimerInterval);
      clearInterval(gameTimerInterval);
      clearInterval(waitInterval);

      if (currentBoard.some(r => r.some(c => c))) {
        const winSymbol = data.winner === telegramId ? mySymbol : (data.winner && data.winner !== 'bot' ? 'O' : null);
        if (winSymbol) highlightWinCells(currentBoard, winSymbol);
      }

      setTimeout(() => {
        $('gameOverModal').classList.remove('hidden');
        if (data.draw) {
          $('gameOverIcon').textContent = '🤝';
          $('gameOverTitle').textContent = 'သရေကျသည်';
          $('gameOverTitle').className = 'text-2xl font-black mb-2 text-gray-300';
          $('gameOverAmount').textContent = '↩️ ၁၀၀၀ ပြန်အမ်း';
          $('gameOverAmount').className = 'text-2xl font-black mb-6 text-gray-300';
        } else if (data.winner === telegramId) {
          $('gameOverIcon').textContent = '🏆';
          $('gameOverTitle').textContent = 'အနိုင်ရရှိသည်!';
          $('gameOverTitle').className = 'text-2xl font-black mb-2 text-amber-400';
          $('gameOverAmount').textContent = '+၁၆၀၀ ကျပ်';
          $('gameOverAmount').className = 'text-3xl font-black mb-6 text-green-400';
        } else {
          $('gameOverIcon').textContent = '😔';
          $('gameOverTitle').textContent = 'ရှုံးနိမ့်သည်';
          $('gameOverTitle').className = 'text-2xl font-black mb-2 text-gray-400';
          $('gameOverAmount').textContent = '-၁၀၀၀ ကျပ်';
          $('gameOverAmount').className = 'text-3xl font-black mb-6 text-red-400';
        }
      }, 800);
    });

    socket.on('gameError', (msg) => {
      alert(msg);
      window.location.href = '/index.html';
    });

    // Buttons
    $('exitBtn').onclick = () => {
      if (!gameEnded && confirm('ဂိမ်းမှ ထွက်မည်မှာ သေချာပါသလား? ရှုံးနိမ့်သည်ဟု မှတ်ယူမည်။')) {
        socket.emit('forfeit', { gameId, telegramId });
        window.location.href = '/index.html';
      } else if (gameEnded) {
        window.location.href = '/index.html';
      }
    };
    $('playAgainBtn').onclick = () => window.location.href = '/play.html?new=1';
    $('exitGameBtn').onclick = () => window.location.href = '/index.html';

    // If coming to play fresh (not joining)
    if (!joinMode && !urlParams.get('join')) {
      // Game already created, we'll get events from server
    }
  </script>
</body>
</html>
