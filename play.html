<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicToeTic - Play Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes timerPulse {
            0% { stroke-dashoffset: 283; }
            100% { stroke-dashoffset: 0; }
        }
        .animate-pulse {
            animation: pulse 1.5s infinite;
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        .animate-bounce {
            animation: bounce 1s infinite;
        }
        .cell {
            transition: all 0.2s;
        }
        .cell:hover:not(.disabled) {
            transform: scale(1.05);
            background: rgba(255,255,255,0.2);
        }
        .cell.X {
            color: #60A5FA;
            text-shadow: 0 0 10px #3B82F6;
        }
        .cell.O {
            color: #F87171;
            text-shadow: 0 0 10px #EF4444;
        }
        .timer-ring {
            transition: stroke-dashoffset 1s linear;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 min-h-screen p-4">
    <div class="max-w-md mx-auto">
        <!-- Game Header -->
        <div class="bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl p-6 mb-4 border border-white/20">
            <div class="flex items-center justify-between mb-4">
                <h1 class="text-2xl font-bold text-white">🎮 TicToeTic</h1>
                <div class="flex items-center space-x-2">
                    <span class="text-purple-200">Balance:</span>
                    <span id="balance" class="text-xl font-bold text-green-400">0</span>
                    <span class="text-green-400">MMK</span>
                </div>
            </div>

            <!-- Game Status -->
            <div id="gameStatus" class="text-center text-white text-lg mb-4 bg-white/5 rounded-xl p-3">
                ကစားရန် Play နှိပ်ပါ
            </div>

            <!-- Timer Display -->
            <div id="timerContainer" class="hidden flex justify-center mb-4">
                <div class="relative w-20 h-20">
                    <svg class="w-20 h-20 transform -rotate-90">
                        <circle cx="40" cy="40" r="36" stroke="currentColor" stroke-width="4" fill="transparent" class="text-white/20"/>
                        <circle id="timerCircle" cx="40" cy="40" r="36" stroke="currentColor" stroke-width="4" fill="transparent" 
                                class="text-yellow-400 timer-ring" stroke-dasharray="226.2" stroke-dashoffset="226.2"/>
                    </svg>
                    <div id="timerText" class="absolute inset-0 flex items-center justify-center text-white font-bold text-xl">5</div>
                </div>
            </div>

            <!-- Play Button (Initial) -->
            <button id="playBtn" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-4 px-4 rounded-xl mb-4 transition-all transform hover:scale-105 shadow-lg text-xl">
                🎮 PLAY GAME (1000 MMK)
            </button>

            <!-- Waiting Animation -->
            <div id="waitingAnimation" class="hidden text-center py-8">
                <div class="animate-spin w-16 h-16 border-4 border-purple-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p class="text-white text-lg mb-2">ကစားသူရှာနေသည်...</p>
                <p id="waitingTimer" class="text-purple-300 text-sm">ကျန်ချိန်: 30 စက္ကန့်</p>
            </div>

            <!-- Game Board -->
            <div id="gameBoard" class="hidden">
                <div class="grid grid-cols-5 gap-2 mb-4">
                    <!-- 5x5 cells will be generated by JS -->
                </div>
                
                <!-- Turn Indicator -->
                <div id="turnIndicator" class="text-center text-white mb-4 p-2 bg-white/5 rounded-xl">
                    သင့်အလှည့်
                </div>
            </div>

            <!-- Post Game Buttons -->
            <div id="postGame" class="hidden grid grid-cols-2 gap-3">
                <button id="playAgainBtn" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3 rounded-lg transition-all">
                    🔄 Play Again
                </button>
                <button id="exitBtn" class="bg-gradient-to-r from-red-500 to-pink-600 hover:from-red-600 hover:to-pink-700 text-white font-bold py-3 rounded-lg transition-all">
                    🏠 Exit
                </button>
            </div>

            <!-- Game Result Message -->
            <div id="resultMessage" class="hidden text-center text-xl font-bold mt-4 p-3 rounded-xl">
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let socket;
        let user = null;
        let currentGameId = null;
        let gameActive = false;
        let mySymbol = null;
        let myTurn = false;
        let timerInterval = null;
        let turnTimerInterval = null;
        let balance = 0;
        let isBotGame = false;

        // Authenticate first
        (async function() {
            try {
                const initData = tg.initData;
                const response = await fetch('https://tiktocbackend.onrender.com/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData })
                });
                
                user = await response.json();
                
                if (user.error) {
                    tg.showAlert('Authentication failed');
                    return;
                }
                
                document.getElementById('balance').textContent = user.balance;
                balance = user.balance;

                // Connect socket
                connectSocket();
            } catch (error) {
                console.error('Auth error:', error);
                tg.showAlert('Connection error');
            }
        })();

        function connectSocket() {
            socket = io('https://tiktocbackend.onrender.com', {
                auth: { token: user.telegramId },
                transports: ['websocket'],
                reconnection: true,
                reconnectionAttempts: 5
            });

            socket.on('connect', () => {
                console.log('Socket connected');
                updateGameStatus('ချိတ်ဆက်မှု အောင်မြင်ပါသည်');
            });

            socket.on('connect_error', (error) => {
                console.error('Socket error:', error);
                updateGameStatus('ချိတ်ဆက်မှု ပျက်ကွက်နေပါသည်');
            });

            socket.on('error', (msg) => {
                tg.showAlert(msg);
            });

            socket.on('waitingForPlayer', (data) => {
                currentGameId = data.gameId;
                document.getElementById('playBtn').classList.add('hidden');
                document.getElementById('waitingAnimation').classList.remove('hidden');
                
                // Start waiting timer
                let seconds = 30;
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    document.getElementById('waitingTimer').textContent = `ကျန်ချိန်: ${seconds} စက္ကန့်`;
                    seconds--;
                    
                    if (seconds < 0) {
                        clearInterval(timerInterval);
                    }
                }, 1000);
            });

            socket.on('gameStarted', (data) => {
                currentGameId = data.gameId;
                gameActive = true;
                mySymbol = data.players[0] === user.telegramId ? 'X' : 'O';
                myTurn = (data.currentTurn === user.telegramId);
                isBotGame = data.isBot || false;
                
                document.getElementById('waitingAnimation').classList.add('hidden');
                document.getElementById('gameBoard').classList.remove('hidden');
                document.getElementById('timerContainer').classList.remove('hidden');
                
                if (timerInterval) clearInterval(timerInterval);
                
                renderBoard(Array(5).fill().map(() => Array(5).fill('')));
                updateGameStatus(myTurn ? 'သင့်အလှည့်' : 'ပြိုင်ဘက်အလှည့်');
                
                if (data.turnStartTime) {
                    startTurnTimer(new Date(data.turnStartTime));
                }
            });

            socket.on('moveMade', (data) => {
                renderBoard(data.board);
                myTurn = (data.currentTurn === user.telegramId);
                updateGameStatus(myTurn ? 'သင့်အလှည့်' : 'ပြိုင်ဘက်အလှည့်');
                
                if (data.turnStartTime) {
                    startTurnTimer(new Date(data.turnStartTime));
                }
            });

            socket.on('gameOver', (data) => {
                gameActive = false;
                renderBoard(data.board);
                
                document.getElementById('gameBoard').classList.add('hidden');
                document.getElementById('timerContainer').classList.add('hidden');
                document.getElementById('postGame').classList.remove('hidden');
                
                if (turnTimerInterval) clearInterval(turnTimerInterval);
                
                let message = '';
                let bgColor = '';
                
                if (data.winner === -1) {
                    message = '🤝 သရေ';
                    bgColor = 'bg-yellow-500/20 text-yellow-400';
                } else if (data.winner === user.telegramId) {
                    message = '🎉 သင်နိုင်သည်! +1600';
                    bgColor = 'bg-green-500/20 text-green-400';
                } else if (data.winner === 0) {
                    message = '🤖 ကွန်ပျူတာက နိုင်သည်';
                    bgColor = 'bg-red-500/20 text-red-400';
                } else {
                    message = '😢 သင်ရှုံးသည်';
                    bgColor = 'bg-red-500/20 text-red-400';
                }
                
                const resultEl = document.getElementById('resultMessage');
                resultEl.textContent = message;
                resultEl.className = `text-center text-xl font-bold mt-4 p-3 rounded-xl ${bgColor}`;
                resultEl.classList.remove('hidden');
                
                // Update balance from server (we'll fetch)
                fetchUserBalance();
            });
        }

        // Play button click
        document.getElementById('playBtn').addEventListener('click', () => {
            if (balance < 1000) {
                tg.showAlert('ငွေမလောက်ပါ။ ကျေးဇူးပြု၍ ငွေဖြည့်ပါ။');
                return;
            }
            
            socket.emit('findGame');
            updateGameStatus('ကစားသူရှာနေသည်...');
        });

        // Render game board
        function renderBoard(board) {
            const container = document.querySelector('#gameBoard .grid');
            container.innerHTML = '';
            
            for (let i = 0; i < 5; i++) {
                for (let j = 0; j < 5; j++) {
                    const cell = document.createElement('div');
                    cell.className = `cell aspect-square bg-white/10 border-2 border-white/20 rounded-lg flex items-center justify-center text-4xl font-bold cursor-pointer transition-all
                        ${board[i][j] === 'X' ? 'X' : board[i][j] === 'O' ? 'O' : ''}
                        ${!gameActive || !myTurn || board[i][j] !== '' ? 'disabled opacity-50 cursor-not-allowed' : 'hover:bg-white/20'}`;
                    cell.textContent = board[i][j];
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    
                    cell.addEventListener('click', () => {
                        if (!gameActive || !myTurn || board[i][j] !== '') return;
                        
                        // Disable cell temporarily to prevent double clicks
                        cell.classList.add('disabled', 'opacity-50');
                        
                        socket.emit('makeMove', { 
                            gameId: currentGameId, 
                            row: i, 
                            col: j 
                        });
                    });
                    
                    container.appendChild(cell);
                }
            }
        }

        // Start turn timer (5 seconds)
        function startTurnTimer(turnStartTime) {
            if (turnTimerInterval) clearInterval(turnTimerInterval);
            
            const updateTimer = () => {
                const now = new Date();
                const elapsed = (now - turnStartTime) / 1000;
                const remaining = Math.max(0, 5 - elapsed);
                
                document.getElementById('timerText').textContent = Math.ceil(remaining);
                
                // Update circle
                const circle = document.getElementById('timerCircle');
                const circumference = 226.2;
                const offset = circumference * (remaining / 5);
                circle.style.strokeDashoffset = circumference - offset;
                
                // Change color based on time
                if (remaining <= 1) {
                    circle.classList.add('text-red-500');
                } else if (remaining <= 2) {
                    circle.classList.add('text-yellow-500');
                } else {
                    circle.classList.remove('text-red-500', 'text-yellow-500');
                }
                
                if (remaining <= 0) {
                    clearInterval(turnTimerInterval);
                }
            };
            
            updateTimer();
            turnTimerInterval = setInterval(updateTimer, 100);
        }

        // Update game status
        function updateGameStatus(text) {
            document.getElementById('gameStatus').textContent = text;
        }

        // Fetch user balance
        async function fetchUserBalance() {
            try {
                const response = await fetch(`https://tiktocbackend.onrender.com/api/user/${user.telegramId}`);
                const data = await response.json();
                document.getElementById('balance').textContent = data.balance;
                balance = data.balance;
            } catch (error) {
                console.error('Error fetching balance:', error);
            }
        }

        // Play Again
        document.getElementById('playAgainBtn').addEventListener('click', () => {
            document.getElementById('postGame').classList.add('hidden');
            document.getElementById('resultMessage').classList.add('hidden');
            document.getElementById('playBtn').classList.remove('hidden');
            updateGameStatus('ကစားရန် Play နှိပ်ပါ');
        });

        // Exit
        document.getElementById('exitBtn').addEventListener('click', () => {
            window.location.href = '/index.html';
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (timerInterval) clearInterval(timerInterval);
            if (turnTimerInterval) clearInterval(turnTimerInterval);
        });
    </script>
</body>
</html>
