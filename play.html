<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TicToeTic - ကစားမည်</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:#080810;min-height:100vh;color:#e8e8f0;overflow-x:hidden;}

.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-layer::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(111,63,245,.15),transparent),
             radial-gradient(ellipse 60% 50% at 90% 90%,rgba(16,185,129,.1),transparent);}
.bg-layer::after{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:40px 40px;}

/* Cards */
.card{position:relative;z-index:1;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:20px;
  backdrop-filter:blur(20px);}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Space Grotesk',sans-serif;font-weight:700;border:none;
  cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1);
  border-radius:14px;padding:13px;width:100%;color:#fff;position:relative;overflow:hidden;}
.btn:active{transform:scale(.96);}
.btn-green{background:linear-gradient(135deg,#059669,#10b981);box-shadow:0 4px 16px rgba(16,185,129,.3);}
.btn-red{background:linear-gradient(135deg,#be123c,#ef4444);box-shadow:0 4px 16px rgba(239,68,68,.25);}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#4f46e5);box-shadow:0 4px 16px rgba(124,58,237,.35);}

/* Board cells */
.cell{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;font-weight:900;border-radius:10px;cursor:pointer;
  background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);
  transition:all .15s cubic-bezier(.4,0,.2,1);user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.cell:not(.taken):not(.disabled):hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3);transform:scale(1.04);}
.cell:not(.taken):not(.disabled):active{transform:scale(.94);}
.cell.taken{cursor:default;}
.cell.disabled{cursor:not-allowed;}
.cell.my-turn:not(.taken){border-color:rgba(251,191,36,.35);}
.cell.sym-x{color:#60a5fa;background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.4);text-shadow:0 0 12px rgba(59,130,246,.6);}
.cell.sym-o{color:#f87171;background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);text-shadow:0 0 12px rgba(239,68,68,.6);}
.cell.win-flash{animation:winFlash .5s ease infinite alternate;}
@keyframes winFlash{from{transform:scale(1)}to{transform:scale(1.1);box-shadow:0 0 20px currentColor;}}
@keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.cell-pop{animation:popIn .25s ease-out;}

/* Timer ring */
.t-ring{position:relative;width:76px;height:76px;}
.t-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.t-track{stroke:rgba(255,255,255,.08);fill:none;stroke-width:5;}
.t-fill{fill:none;stroke-width:5;stroke-linecap:round;stroke-dasharray:213;stroke-dashoffset:0;transition:stroke-dashoffset .8s linear,stroke .5s;}
.t-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:#fff;}

/* Status badges */
.badge{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:100px;font-size:12px;font-weight:700;}
.badge-blue{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#93c5fd;}
.badge-red{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.badge-green{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;}
.badge-yellow{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:#fde68a;}
.badge-purple{background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);color:#c4b5fd;}

/* Dot loader */
.dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:#c4b5fd;margin:0 2px;
  animation:dotUp 1.4s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dotUp{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}

/* Result Overlay */
#resOverlay{position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);}
.res-card{background:linear-gradient(135deg,rgba(20,15,40,.95),rgba(30,20,60,.95));
  border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:32px 24px;
  text-align:center;max-width:300px;width:90%;
  animation:resSlide .4s cubic-bezier(.16,1,.3,1);}
@keyframes resSlide{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.res-emoji{font-size:4rem;margin-bottom:10px;}
.res-title{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:6px;}
.res-sub{font-size:.85rem;color:rgba(255,255,255,.5);margin-bottom:24px;}

/* Searching spinner */
.search-ring{width:56px;height:56px;border:4px solid rgba(255,255,255,.08);
  border-top-color:#7c3aed;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Fade anim */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;}

/* Loader */
#pageLoader{position:fixed;inset:0;background:#080810;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.pg-ring{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);
  border-top-color:#7c3aed;border-radius:50%;animation:spin 1s linear infinite;}
</style>
</head>
<body>
<div class="bg-layer"></div>

<!-- Page Loader -->
<div id="pageLoader">
  <div style="font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:#fff;">TicToeTic</div>
  <div class="pg-ring"></div>
</div>

<!-- Result Overlay -->
<div id="resOverlay">
  <div class="res-card">
    <div class="res-emoji" id="resEmoji">🏆</div>
    <div class="res-title" id="resTitle"></div>
    <div class="res-sub" id="resSub"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <button class="btn btn-green" onclick="playAgain()">🔄 ထပ်ကစား</button>
      <button class="btn btn-red" onclick="goHome()">🏠 ထွက်</button>
    </div>
  </div>
</div>

<div id="mainWrap" style="display:none;max-width:440px;margin:0 auto;padding:12px 12px 32px;">

  <!-- Top bar -->
  <div class="card p-3 mb-3 fade-up" style="display:flex;align-items:center;justify-content:space-between;">
    <button onclick="goHome()" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:9px;cursor:pointer;transition:.2s;" onactive="this.style.transform='scale(.94)'">
      <svg width="18" height="18" fill="none" stroke="#e8e8f0" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <div style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:#fff;">🎮 TicToeTic</div>
    <div style="text-align:right;">
      <div style="font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;">လက်ကျန်</div>
      <div style="font-weight:800;color:#4ade80;font-size:.95rem;" id="topBal">0 MMK</div>
    </div>
  </div>

  <!-- Main game card -->
  <div class="card p-4 fade-up" style="animation-delay:.05s;">

    <!-- IDLE state -->
    <div id="sIdle">
      <div style="text-align:center;padding:24px 0;">
        <div style="font-size:3.5rem;margin-bottom:14px;">🎮</div>
        <div style="font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:6px;">ကစားရန် အသင့်ဖြစ်ပြီ</div>
        <div style="font-size:13px;color:rgba(255,255,255,.35);margin-bottom:22px;">ကစားသူ ၂ ဦး ကစားနိုင်သည်</div>

        <div style="background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px;margin-bottom:22px;text-align:left;">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:10px;">
            <span style="color:rgba(255,255,255,.45);">ဝင်ကြေး</span>
            <span style="font-weight:700;color:#fff;">1,000 MMK</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:10px;">
            <span style="color:rgba(255,255,255,.45);">နိုင်ရင် ရမည်</span>
            <span style="font-weight:700;color:#4ade80;">1,600 MMK</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:13px;">
            <span style="color:rgba(255,255,255,.45);">သရေကျလျှင်</span>
            <span style="font-weight:700;color:#60a5fa;">500 MMK ပြန်ရ</span>
          </div>
        </div>

        <button class="btn btn-purple" style="font-size:1.05rem;" onclick="startSearch()">
          🎮 PLAY (1,000 MMK)
        </button>
      </div>
    </div>

    <!-- SEARCHING state -->
    <div id="sSearch" style="display:none;">
      <div style="text-align:center;padding:28px 0;">
        <div class="search-ring mb-4" style="margin-bottom:18px;"></div>
        <div style="font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:#fff;margin-bottom:10px;">ကစားသူ ရှာနေသည်</div>
        <div class="dots" style="margin-bottom:14px;"><span></span><span></span><span></span></div>
        <div class="badge badge-yellow" style="margin:0 auto 20px;display:inline-flex;">
          ⏱️ <span id="searchSec">30</span> စက္ကန့်
        </div>
        <button class="btn btn-red" style="max-width:180px;margin:0 auto;" onclick="cancelSearch()">❌ ပယ်ဖျက်မည်</button>
      </div>
    </div>

    <!-- PLAYING state -->
    <div id="sPlay" style="display:none;">

      <!-- Player badges -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div class="badge badge-blue" id="p1Badge">✖ <span id="p1Name">You</span></div>
        <div style="font-family:'Syne',sans-serif;font-weight:800;color:rgba(255,255,255,.3);font-size:.85rem;">VS</div>
        <div class="badge badge-red" id="p2Badge">⭕ <span id="p2Name">ကစားသူ</span></div>
      </div>

      <!-- Turn status -->
      <div style="text-align:center;margin-bottom:12px;" id="turnWrap">
        <div class="badge badge-green" style="display:inline-flex;" id="turnBadge">🎯 သင့်လှည့်</div>
      </div>

      <!-- Timer -->
      <div style="display:flex;justify-content:center;margin-bottom:12px;">
        <div class="t-ring">
          <svg width="76" height="76" viewBox="0 0 76 76">
            <circle cx="38" cy="38" r="34" class="t-track"/>
            <circle cx="38" cy="38" r="34" class="t-fill" id="tFill" stroke="#fbbf24"/>
          </svg>
          <div class="t-num" id="tNum">10</div>
        </div>
      </div>

      <!-- Board 5x5 -->
      <div id="board" style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px;"></div>

      <div style="text-align:center;font-size:11px;color:rgba(255,255,255,.25);">⚔️ 4 ကွက်တန်းလျှင် အနိုင်ရသည်</div>
    </div>

  </div><!-- /card -->

  <!-- Info bar -->
  <div style="text-align:center;font-size:11px;color:rgba(255,255,255,.2);margin-top:10px;">
    ⏱️ 10 စက္ကန့် • ✖ or ⭕ 4 ကွက်တန်း • 🏆 1,600 MMK
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){tg.expand();tg.ready();}

const API    = 'https://tiktocbackend.onrender.com';
const SOCKET = 'https://tiktocbackend.onrender.com';
const TURN_S = 10;

let socket=null, user=null, gameId=null, mySymbol=null;
let isMyTurn=false, turnTimer=null, searchTimer=null;
let searchLeft=30, turnLeft=TURN_S;
let board=Array(5).fill(null).map(()=>Array(5).fill(''));

// ── Init ──
async function init(){
  try{
    const initData=tg?.initData||'';
    const body=initData?{initData}:{telegramId:12345};
    const r=await fetch(`${API}/api/auth`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok)throw new Error(r.status);
    user=await r.json();
    document.getElementById('topBal').textContent=`${(user.balance||0).toLocaleString()} MMK`;
  }catch(e){
    console.error('init err',e);
  }

  // Check if arriving via join link from bot
  const urlP=new URLSearchParams(window.location.search);
  const joinId=urlP.get('join');

  hidePgLoader();

  if(joinId && user){
    // Auto-start search with join target
    connectSocket(joinId);
    showState('search');
    socket.emit('findGame',{userId:user.telegramId});
  }
}

function hidePgLoader(){
  const l=document.getElementById('pageLoader');
  l.style.transition='opacity .3s';l.style.opacity='0';
  setTimeout(()=>{l.style.display='none';document.getElementById('mainWrap').style.display='block';},300);
}

// ── Socket ──
function connectSocket(joinGameId){
  if(socket?.connected)return;
  socket=io(SOCKET,{
    query: joinGameId?{join:joinGameId}:{},
    transports:['websocket','polling'],
    reconnection:true,reconnectionAttempts:5,timeout:10000
  });

  socket.on('connect',()=>console.log('socket ok',socket.id));

  socket.on('connect_error',(e)=>{
    console.error('socket err',e);
    showState('idle');
    alert('ချိတ်ဆက်မှု ပြဿနာ: '+e.message);
  });

  socket.on('error',(d)=>{
    const msg=typeof d==='string'?d:d?.msg||'Error';
    stopSearch();showState('idle');
    if(tg?.showAlert)tg.showAlert(msg);else alert(msg);
  });

  socket.on('insufficientBalance',()=>{
    stopSearch();showState('idle');
    if(tg?.showAlert)tg.showAlert('လက်ကျန်ငွေ မလုံလောက်ပါ (1,000 MMK လိုသည်)');
    else alert('လက်ကျန်ငွေ မလုံလောက်ပါ');
  });

  socket.on('waitingForPlayer',({gameId:gid})=>{
    gameId=gid; startSearchTimer();
  });

  socket.on('gameStarted',(data)=>{
    stopSearch();
    gameId=data.gameId;
    board=data.board||Array(5).fill(null).map(()=>Array(5).fill(''));
    mySymbol=data.mySymbol;
    isMyTurn=data.currentTurn===user.telegramId;

    // Set player names
    const names=data.players||{};
    const me=names[user.telegramId]||'You';
    const opp=Object.entries(names).find(([k])=>parseInt(k)!==user.telegramId)?.[1]||'ကစားသူ';
    if(mySymbol==='X'){
      document.getElementById('p1Name').textContent=me;
      document.getElementById('p2Name').textContent=opp;
    }else{
      document.getElementById('p1Name').textContent=opp;
      document.getElementById('p2Name').textContent=me;
      // Swap badge colors visually to match symbols
      document.getElementById('p1Badge').className='badge badge-blue';
      document.getElementById('p2Badge').className='badge badge-red';
    }

    buildBoard();showState('play');updateTurnUI();startTurnTimer();
  });

  socket.on('gameResumed',(data)=>{
    gameId=data.gameId;mySymbol=data.mySymbol;
    board=data.board||Array(5).fill(null).map(()=>Array(5).fill(''));
    isMyTurn=data.currentTurn===user.telegramId;
    const names=data.players||{};
    const me=names[user.telegramId]||'You';
    const opp=Object.entries(names).find(([k])=>parseInt(k)!==user.telegramId)?.[1]||'ကစားသူ';
    document.getElementById('p1Name').textContent=mySymbol==='X'?me:opp;
    document.getElementById('p2Name').textContent=mySymbol==='X'?opp:me;
    buildBoard();showState('play');updateTurnUI();startTurnTimer();
  });

  socket.on('moveMade',(data)=>{
    board=data.board;
    isMyTurn=data.currentTurn===user.telegramId;
    updateBoard();updateTurnUI();resetTurnTimer();
  });

  socket.on('turnChanged',(data)=>{
    isMyTurn=data.currentTurn===user.telegramId;
    updateTurnUI();resetTurnTimer();
  });

  socket.on('gameOver',(data)=>{
    stopTurnTimer();
    board=data.board;
    updateBoard(true);
    setTimeout(()=>{
      showResult(data.winner,data.reason);
      refreshBal();
    },600);
  });

  socket.on('opponentDisconnected',()=>{
    stopTurnTimer();
    const b=document.getElementById('turnBadge');
    b.className='badge badge-yellow';
    b.textContent='⚡ ဆက်လက်ချိတ်ဆက်ရန် စောင့်နေသည်...';
  });

  socket.on('searchTimeout',()=>{stopSearch();showState('idle');});
  socket.on('searchCancelled',()=>{stopSearch();showState('idle');});
}

// ── States ──
function showState(s){
  document.getElementById('sIdle').style.display=s==='idle'?'block':'none';
  document.getElementById('sSearch').style.display=s==='search'?'block':'none';
  document.getElementById('sPlay').style.display=s==='play'?'block':'none';
}

// ── Search ──
function startSearch(){
  if(!user){alert('Login ဝင်ပါ');return;}
  if(user.balance<1000){
    if(tg?.showAlert)tg.showAlert('လက်ကျန်ငွေ မလုံလောက်ပါ (1,000 MMK လိုသည်)');
    else alert('လက်ကျန်ငွေ မလုံလောက်ပါ');
    return;
  }
  connectSocket();
  showState('search');
  searchLeft=30;
  document.getElementById('searchSec').textContent=30;
  socket.emit('findGame',{userId:user.telegramId});
}

function cancelSearch(){
  socket?.emit('cancelSearch',{userId:user?.telegramId});
  stopSearch();showState('idle');
}

function startSearchTimer(){
  clearInterval(searchTimer);
  searchLeft=30;
  searchTimer=setInterval(()=>{
    searchLeft--;
    document.getElementById('searchSec').textContent=searchLeft;
    if(searchLeft<=0)stopSearch();
  },1000);
}
function stopSearch(){clearInterval(searchTimer);}

// ── Board ──
function buildBoard(){
  const el=document.getElementById('board');
  el.innerHTML='';
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){
    const div=document.createElement('div');
    div.className='cell';
    div.id=`c${r}${c}`;
    div.dataset.r=r;div.dataset.c=c;
    div.addEventListener('click',()=>makeMove(r,c));
    const v=board[r][c];
    if(v){
      div.textContent=v==='X'?'✖':'⭕';
      div.classList.add('taken','sym-'+v.toLowerCase());
    }
    el.appendChild(div);
  }
  updateInteract();
}

function updateBoard(final=false){
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){
    const cell=document.getElementById(`c${r}${c}`);
    if(!cell)continue;
    const v=board[r][c];
    if(v&&!cell.classList.contains('taken')){
      cell.textContent=v==='X'?'✖':'⭕';
      cell.classList.add('taken','sym-'+v.toLowerCase(),'cell-pop');
    }
  }
  if(!final)updateInteract();
}

function updateInteract(){
  document.querySelectorAll('.cell').forEach(c=>{
    if(c.classList.contains('taken')){c.classList.add('disabled');c.classList.remove('my-turn');}
    else if(isMyTurn){c.classList.remove('disabled');c.classList.add('my-turn');}
    else{c.classList.add('disabled');c.classList.remove('my-turn');}
  });
}

function makeMove(r,c){
  if(!isMyTurn||!gameId||!socket?.connected)return;
  const cell=document.getElementById(`c${r}${c}`);
  if(cell?.classList.contains('taken'))return;
  isMyTurn=false;updateInteract();
  socket.emit('makeMove',{gameId,row:r,col:c});
}

// ── Turn Timer ──
function startTurnTimer(){
  turnLeft=TURN_S;updateTimerUI(TURN_S);
  stopTurnTimer();
  turnTimer=setInterval(()=>{
    turnLeft--;updateTimerUI(turnLeft);
    if(turnLeft<=0)stopTurnTimer();
  },1000);
}
function resetTurnTimer(){stopTurnTimer();startTurnTimer();}
function stopTurnTimer(){clearInterval(turnTimer);}

function updateTimerUI(val){
  const num=document.getElementById('tNum');
  const fill=document.getElementById('tFill');
  if(!num||!fill)return;
  num.textContent=Math.max(0,val);
  const pct=val/TURN_S;
  fill.style.strokeDashoffset=213*(1-pct);
  if(val<=3){fill.style.stroke='#ef4444';num.style.color='#f87171';}
  else if(val<=5){fill.style.stroke='#f97316';num.style.color='#fb923c';}
  else{fill.style.stroke='#fbbf24';num.style.color='#fff';}
}

// ── Turn UI ──
function updateTurnUI(){
  const badge=document.getElementById('turnBadge');
  if(isMyTurn){
    badge.className='badge badge-green';badge.textContent='🎯 သင့်လှည့်';
  }else{
    badge.className='badge badge-purple';
    badge.innerHTML='<div class="dots"><span></span><span></span><span></span></div> ကစားသူ၏ လှည့်';
  }
  updateInteract();
}

// ── Result ──
function showResult(winner,reason){
  const overlay=document.getElementById('resOverlay');
  const emoji=document.getElementById('resEmoji');
  const title=document.getElementById('resTitle');
  const sub=document.getElementById('resSub');

  if(winner===user.telegramId){
    emoji.textContent='🏆';title.textContent='အနိုင်ရပြီ!';title.style.color='#4ade80';
    sub.textContent='+1,600 MMK ရရှိပြီ!';
  }else if(winner===-1){
    emoji.textContent='🤝';title.textContent='သရေကျပြီ!';title.style.color='#60a5fa';
    sub.textContent='+500 MMK ပြန်ရပြီ';
  }else{
    emoji.textContent='😔';title.textContent='ရှုံးပြီ';title.style.color='#f87171';
    sub.textContent=reason==='timeout'?'⏱️ အချိန်ကုန်သွားသည်':reason==='disconnect'?'ကစားသူ ထွက်သွားသည်':'ထပ်ကြိုးစားပါ!';
  }

  overlay.style.display='flex';
}

function playAgain(){
  document.getElementById('resOverlay').style.display='none';
  gameId=null;mySymbol=null;isMyTurn=false;
  board=Array(5).fill(null).map(()=>Array(5).fill(''));
  showState('idle');
}

function goHome(){window.location.href='/index.html';}

async function refreshBal(){
  if(!user?.telegramId)return;
  try{
    const r=await fetch(`${API}/api/user/${user.telegramId}`);
    const d=await r.json();
    if(d.balance!==undefined){
      user.balance=d.balance;
      document.getElementById('topBal').textContent=`${d.balance.toLocaleString()} MMK`;
    }
  }catch(e){}
}

init();
</script>
